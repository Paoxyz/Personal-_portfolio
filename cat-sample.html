<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Cat with Theme Toggle</title>
    <style>
        /* Theme Variables */
        :root {
            --bg: #ffffff;
            --cat: #2d3436; 
            --bubble-bg: #e0e0e0;
            --text: #2d3436;
            --toggle-bg: #dfe6e9;
        }

        /* Dark Mode Class (Toggled via JS) */
        body.dark-mode {
            --bg: #1a1a1a;
            --cat: #ffffff; 
            --bubble-bg: #333333;
            --text: #ffffff;
            --toggle-bg: #636e72;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* UI Controls */
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--toggle-bg);
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* The Cat Container */
        #pet-container {
            position: absolute;
            width: 80px;
            height: 100px;
            transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        top 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        /* Speech Bubble */
        .bubble {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: var(--bubble-bg);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .bubble.show { transform: translateX(-50%) scale(1); }

        /* Cat Art */
        .cat-visuals {
            position: relative;
            width: 60px;
            height: 45px;
            background: var(--cat);
            border-radius: 40% 40% 30% 30%;
            margin-top: 30px;
            transition: background 0.4s ease;
        }

        .head {
            position: absolute;
            top: -22px;
            left: 5px;
            width: 50px;
            height: 38px;
            background: var(--cat);
            border-radius: 50%;
            transition: background 0.4s ease;
        }

        .ear {
            position: absolute;
            top: -12px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 18px solid var(--cat);
            transition: border-bottom 0.4s ease;
        }
        .ear.l { left: 4px; transform: rotate(-15deg); }
        .ear.r { right: 4px; transform: rotate(15deg); }

        .eye {
            position: absolute;
            top: 15px;
            width: 6px;
            height: 6px;
            background: var(--bg);
            border-radius: 50%;
            transition: background 0.4s ease;
        }
        .eye.l { left: 14px; }
        .eye.r { right: 14px; }

        .tail {
            position: absolute;
            right: -8px;
            bottom: 8px;
            width: 25px;
            height: 8px;
            background: var(--cat);
            border-radius: 10px;
            transform-origin: left;
            animation: wag 0.8s infinite alternate ease-in-out;
            transition: background 0.4s ease;
        }

        /* 5 ACTIONS */
        .act-jump { animation: jump 0.5s ease; }
        .act-shake { animation: shake 0.2s infinite; }
        .act-spin { animation: spin 0.6s ease-out; }
        .act-pounce { animation: pounce 0.5s ease-in-out; }
        .act-sleep { opacity: 0.4; transform: scale(0.85); transition: 0.5s; }

        @keyframes wag { from { transform: rotate(-10deg); } to { transform: rotate(30deg); } }
        @keyframes jump { 50% { transform: translateY(-70px) rotate(10deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-6px); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pounce { 50% { transform: scaleX(1.3) scaleY(0.8); } }

    </style>
</head>
<body id="body">

    <div id="controls" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span>
        <span id="theme-text">Switch to Dark</span>
    </div>

    <div id="pet-container">
        <div id="bubble" class="bubble">Meow!</div>
        <div id="cat-main">
            <div class="ear l"></div>
            <div class="ear r"></div>
            <div class="cat-visuals">
                <div class="head">
                    <div class="eye l"></div>
                    <div class="eye r"></div>
                </div>
                <div class="tail"></div>
            </div>
        </div>
    </div>

<script>
    const body = document.getElementById('body');
    const themeIcon = document.getElementById('theme-icon');
    const themeText = document.getElementById('theme-text');
    const container = document.getElementById('pet-container');
    const catMain = document.getElementById('cat-main');
    const bubble = document.getElementById('bubble');

    // 1. Theme Toggle Logic
    function toggleTheme() {
        body.classList.toggle('dark-mode');
        const isDark = body.classList.contains('dark-mode');
        themeIcon.innerText = isDark ? "☀️" : "🌙";
        themeText.innerText = isDark ? "Switch to Light" : "Switch to Dark";
        showBubble(isDark ? "Ooh, spooky!" : "Too bright!");
    }

    // 2. Behaviors & Actions
    const behaviors = [
        { msg: "Look at me go!", class: "act-jump" },
        { msg: "Wheeee!", class: "act-spin" },
        { msg: "Brrr... chilly.", class: "act-shake" },
        { msg: "Hunting mode!", class: "act-pounce" },
        { msg: "Nap time...", class: "act-sleep" }
    ];

    function showBubble(text) {
        bubble.innerText = text;
        bubble.classList.add('show');
        setTimeout(() => bubble.classList.remove('show'), 2000);
    }

    function move() {
        const x = Math.max(50, Math.random() * (window.innerWidth - 150));
        const y = Math.max(80, Math.random() * (window.innerHeight - 150));
        
        const currentX = parseFloat(container.style.left || 0);
        catMain.style.transform = x < currentX ? 'scaleX(-1)' : 'scaleX(1)';
        
        container.style.left = `${x}px`;
        container.style.top = `${y}px`;
    }

    function performAction() {
        const action = behaviors[Math.floor(Math.random() * behaviors.length)];
        showBubble(action.msg);
        catMain.classList.add(action.class);
        
        setTimeout(() => {
            catMain.classList.remove(action.class);
        }, 1500);
    }

    // Interaction
    container.addEventListener('click', () => {
        const greetings = ["Purrr...", "Meow?", "Don't stop!", "Hey there!"];
        showBubble(greetings[Math.floor(Math.random() * greetings.length)]);
        catMain.classList.add('act-jump');
        setTimeout(() => catMain.classList.remove('act-jump'), 500);
    });

    // AI Routine
    setInterval(() => {
        const rng = Math.random();
        if (rng > 0.7) move();
        else if (rng > 0.4) performAction();
    }, 3000);

    // Initial position
    move();
</script>
</body>
</html>
