<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <title>Music Orbit | Paolo Garcia</title>
    <style>
        /* --- CONSISTENT BACKGROUND (INDEX.HTML STYLE) --- */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #050505; color: #efefef; }

        /* Smooth Floating Animation */
        @keyframes orbitFloat {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -20px) rotate(2deg); }
            66% { transform: translate(-20px, 30px) rotate(-2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .album-orbit { 
            position: absolute; 
            z-index: 10; 
            cursor: grab; 
            touch-action: none; /* Prevents scrolling while dragging */
            user-select: none;
        }
        .album-orbit:active { cursor: grabbing; }

        /* --- RESPONSIVE ALBUM BOX --- */
        .album-card {
            width: 180px; 
            background: rgba(17, 17, 17, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 12px; backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); transition: border-color 0.4s ease, background 0.4s ease;
        }

        @media (max-width: 768px) {
            .album-card { width: 130px; padding: 8px; }
            .album-title { font-size: 9px !important; }
            .album-artist { font-size: 7px !important; }
        }

        .album-art {
            width: 100%; aspect-ratio: 1/1; background: #111; border-radius: 6px;
            margin-bottom: 12px; overflow: hidden; pointer-events: none;
        }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .album-text { text-align: left; pointer-events: none; }
        .album-title { font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .album-artist { font-size: 9px; color: #71717a; text-transform: uppercase; }

        /* Dragging State */
        .dragging { opacity: 0.8; z-index: 1000; animation: none !important; }

        /* Nav & Player (Consistent with Home) */
        .nav-header { position: fixed; top: 0; left: 0; width: 100%; padding: 30px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { display: inline-flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #71717a; transition: 0.3s; }
        .back-btn:hover { color: #fff; }

        #player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000;
            transform: translateY(100%); transition: transform 0.5s ease;
        }
        #player-bar.active { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="nav-header">
        <a href="index.html" class="back-btn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Paolo Garcia
        </a>
        <div class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-600">Drag to remove • Click to play</div>
    </div>

    <div id="orbit-container"></div>

    <div id="player-bar">
        <div class="max-w-5xl mx-auto flex items-center gap-6">
            <div id="active-img" class="w-12 h-12 rounded bg-zinc-800 bg-cover bg-center"></div>
            <div class="flex-1">
                <h4 id="now-playing-title" class="text-white font-black text-[10px] uppercase">Song Title</h4>
                <audio id="audio-element" controls class="w-full h-8 mt-2"></audio>
            </div>
            <button onclick="closePlayer()" class="text-zinc-600 hover:text-white text-[10px] font-black uppercase">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const container = document.getElementById('orbit-container');
        const tracks = [
            { title: "Best Part feat(H.E.R.)", artist: "Daniel Caesar", file: "Best Part (feat. H.E.R.).mp3", img: "Best-part.jpeg" },
            { title: "Snooze", artist: "SZA", file: "Snooze.mp3", img: "snooze.jpeg" },
            { title: "Euphoria", artist: "Kendrick Lamar", file: "euphoria.mp3", img: "euphoria.jpeg" },
            { title: "Open Arms", artist: "SZA, Travis Scott", file: "Open Arms (feat. Travis Scott).mp3", img: "openarms.jpeg" },
            { title: "Starboy", artist: "The Weeknd", file: "Starboy.mp3", img: "starboy.jpeg" },
            { title: "679", artist: "Fetty Wap", file: "679 (feat. Monty).mp3", img: "679.jpeg" },
            { title: "Luhter", artist: "Kendrick Lamar", file: "luther (with sza).mp3", img: "luther.jpeg" },
            { title: "Rather Lie", artist: "Playboi Carti", file: "RATHER LIE (with The Weeknd).mp3", img: "ammusic.jpeg" },
            { title: "Hold me Down", artist: "Daniel Caesar", file: "Hold me Down.mp3", img: "holdmedown.jpeg" },
            { title: "Love You Less", artist: "Joji", file: "Love You Less.mp3", img: "loveyouless.jpeg" }
        ];

        tracks.forEach((track, i) => {
            const el = document.createElement('div');
            el.className = 'album-orbit';
            
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.max(100, Math.random() * (window.innerHeight - 300));
            const duration = 15 + Math.random() * 10;
            const delay = Math.random() * -20;

            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.animation = `orbitFloat ${duration}s infinite ease-in-out ${delay}s`;

            el.innerHTML = `
                <div class="album-card" onclick="handleCardClick(event, '${track.file}', '${track.title}', '${track.img}')">
                    <div class="album-art"><img src="${track.img}"></div>
                    <div class="album-text">
                        <span class="album-title truncate block">${track.title}</span>
                        <span class="album-artist truncate block">${track.artist}</span>
                    </div>
                </div>
            `;
            container.appendChild(el);
            makeDraggable(el);
        });

        // --- DRAG LOGIC ---
        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            let isDragging = false;

            el.onmousedown = dragMouseDown;
            el.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                isDragging = false;
                pos3 = e.clientX || e.touches[0].clientX;
                pos4 = e.clientY || e.touches[0].clientY;
                document.onmouseup = closeDragElement;
                document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchmove = elementDrag;
                el.classList.add('dragging');
            }

            function elementDrag(e) {
                isDragging = true;
                e = e || window.event;
                let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                el.classList.remove('dragging');
                
                // Remove logic: if moved more than 150px during drag, delete it
                if (Math.abs(pos1) > 10 || Math.abs(pos2) > 10) {
                    // Logic to "toss" it away could go here
                }
            }
            
            el.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                el.style.transition = 'all 0.5s ease';
                el.style.transform = 'scale(0) rotate(20deg)';
                setTimeout(() => el.remove(), 500);
            });
        }

        function handleCardClick(e, file, songTitle, img) {
            // Only play if we weren't dragging
            if (e.target.closest('.album-orbit').classList.contains('dragging')) return;
            playMusic(file, songTitle, img);
        }

        const player = document.getElementById('player-bar');
        const audio = document.getElementById('audio-element');
        function playMusic(file, songTitle, img) {
            audio.src = file;
            document.getElementById('now-playing-title').innerText = songTitle;
            document.getElementById('active-img').style.backgroundImage = `url(${img})`;
            player.classList.add('active');
            audio.play();
        }
        function closePlayer() { player.classList.remove('active'); audio.pause(); }

        // --- INDEX.HTML PARTICLES (EXACT CLONE) ---
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 110, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1.5 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" } },
                "modes": { "repulse": { "distance": 100, "duration": 0.4 } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
